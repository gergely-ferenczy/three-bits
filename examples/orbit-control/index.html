<!doctype html>
<html lang="en">
  <head>
    <title>three-bits orbit control example</title>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0"
    />
    <link rel="stylesheet" href="/normalize.css" />
  </head>
  <body>
    <div
      style="
        font-family: sans-serif;
        font-size: 14px;
        position: absolute;
        padding: 16px;
        gap: 8px;
        display: grid;
        grid-template-columns: auto auto;
        color: #ffffff;
      "
    >
      <div>Target position</div>
      <div id="target-position"></div>
      <div>Camera position</div>
      <div id="camera-position"></div>
      <div>Camera zoom</div>
      <div id="camera-zoom"></div>
    </div>
    <script type="module" src="./app.js"></script>
  </body>
</html>
